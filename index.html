<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Web Synthesizer</title>

<style>

body {
    font-family: Georgia, serif;
    background: linear-gradient(135deg, #d8b1ff, #bfa2ff);
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.9);
    padding: 35px 45px;
    border-radius: 12px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.2);
    width: 420px;
    text-align: center;
}

h1 {
    margin-top: 0;
    color: #333;
}

#description {
    font-size: 18px;
    margin-bottom: 25px;
    color: #444;
}

.controls {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.control-group {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

label {
    font-size: 15px;
    color: #333;
}

select,
input[type="number"] {
    padding: 8px 10px;
    font-size: 14px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #f5f5f5;
}

button {
    margin-top: 20px;
    padding: 12px 18px;
    font-size: 16px;
    background: #6a5acd;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.25s;
}

button:hover {
    background: #5848c2;
}

#noteContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.note {
    position: absolute;
    width: 50px;
    height: 50px;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #666;
}

</style>
</head>


<body>

<div class="container">

<h1>🎹 Web Synth</h1>

<p id="description">
Press keys on your keyboard to play notes.
</p>

<div class="controls">

<div class="control-group">
<label for="waveform">Waveform</label>
<select id="waveform">
  <option value="sine">Sine</option>
  <option value="square">Square</option>
  <option value="sawtooth" selected>Sawtooth</option>
  <option value="triangle">Triangle</option>
</select>
</div>

<div class="control-group">
<label for="synthesis">Synthesis</label>
<select id="synthesis">
  <option value="additive" selected>Additive</option>
  <option value="am">AM</option>
  <option value="fm">FM</option>
</select>
</div>

<div id="modulationFreqOption" class="control-group" style="display:none;">
<label for="modulationFreq">Modulation Freq</label>
<input type="number" id="modulationFreq" min="0" max="400">
</div>

<div id="lfoOption" class="control-group">
<label>
<input type="checkbox" id="lfoCheckbox" onChange="updateCheckbox()">
Use LFO
</label>
</div>

<div id="oscOption" class="control-group">
<label for="oscNum">Oscillators</label>
<input type="number" id="oscNum" min="1" max="10">
</div>

</div>

<button id="jingleBellsButton">Play Jingle Bells 🎄</button>

<div class="footer">
Keyboard controlled synthesizer
</div>

</div>

<div id="noteContainer"></div>

<script src="main.js"></script>

</body>

</html>
