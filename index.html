<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Liz Radway HW2 – Web Synthesizer</title>

<style>

body {
    font-family: Georgia, serif;
    background-color: #d8b1ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding-top: 40px;
}

#description {
    font-size: 24px;
    margin-bottom: 10px;
    color: white;
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

#keyboardGuide {
    background: rgba(255,255,255,0.85);
    padding: 15px 25px;
    border-radius: 8px;
    margin-bottom: 25px;
    text-align: center;
    font-size: 15px;
}

.keyRow {
    margin-top: 8px;
    font-family: monospace;
}

#controls {
    background-color: rgba(255,255,255,0.85);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
}

label {
    margin-right: 8px;
}

select,
input[type="number"] {
    padding: 6px;
    margin: 5px;
}

#noteContainer {
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.note {
    position:absolute;
    width:50px;
    height:50px;
}

button {
    margin-top:20px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:5px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#45a049;
}

</style>
</head>


<body>

<p id="description">
Press keys on your keyboard to play notes.
</p>

<div id="keyboardGuide">

<b>Keyboard Layout</b>

<div class="keyRow">
Z  S  X  D  C  V  G  B  H  N  J  M
</div>

<div class="keyRow">
Q  2  W  3  E  R  5  T  6  Y  7  U
</div>

<div style="margin-top:8px;font-size:13px;">
White notes are the letter keys.  
Sharp/flat notes use the number or adjacent keys.
</div>

</div>


<div id="controls">

<label for="waveform">Waveform:</label>

<select id="waveform">
<option value="sine">Sine</option>
<option value="square">Square</option>
<option value="sawtooth" selected>Sawtooth</option>
<option value="triangle">Triangle</option>
</select>


<select id="synthesis">
<option value="additive" selected>Additive</option>
<option value="am">AM</option>
<option value="fm">FM</option>
</select>


<div id="modulationFreqOption" style="display:none;">
<label for="modulationFreq">Modulation Frequency:</label>
<input type="number" id="modulationFreq" min="0" max="400">
</div>


<div id="lfoOption">
<label>
<input type="checkbox" id="lfoCheckbox" onChange="updateCheckbox()">
Use LFO
</label>
</div>


<div id="oscOption">
<label for="oscNum">Oscillator Count:</label>
<input type="number" id="oscNum" min="1" max="10">
</div>

</div>


<div id="noteContainer"></div>

<button id="jingleBellsButton">Play Jingle Bells</button>

<script>

const today = new Date();
const isChristmas = (today.getMonth() === 11 && today.getDate() === 25);

if(!isChristmas){
    document.getElementById("jingleBellsButton").style.display = "none";
}

</script>

<script src="main.js"></script>

</body>

</html>
